<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman'yň kömekçisi Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 500px; }
        .chat-header { background-color: #4CAF50; color: white; padding: 15px; text-align: center; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .chat-history { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 5px; max-width: 75%; }
        .bot { background-color: #e1ffc7; align-self: flex-start; }
        .user { background-color: #d1e7dd; align-self: flex-end; }
        .chat-input { padding: 15px; border-top: 1px solid #ccc; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Aman'yň kömekçisi Chatbot
    </div>
    <div class="chat-history" id="history">
        <div class="message bot">Salam! Men siziň kömekçi chat-botuňyz. Size nähili kömek edip bilerin?</div>
    </div>
    <div class="chat-input">
        <input id="input" type="text" placeholder="Habaryňyzy ýazyň...">
        <button id="send">Ugrat</button>
    </div>
</div>

</body>
</html>
